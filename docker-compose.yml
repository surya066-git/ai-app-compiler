services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      OFFLINE_DEMO_MODE: ${OFFLINE_DEMO_MODE:-true}
      PROVIDER_TIMEOUT_SECONDS: ${PROVIDER_TIMEOUT_SECONDS:-45}
      PROVIDER_COOLDOWN_SECONDS: ${PROVIDER_COOLDOWN_SECONDS:-120}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
    volumes:
      - compiler_generated:/data/generated_projects
      - compiler_storage:/data/storage

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  compiler_generated:
  compiler_storage:
